name: Daily News Curation

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전일). GitHub Actions cron은 정시 실행이 보장되지 않아 5~15분 지연될 수 있음.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (full=처음부터 / verify_only=검증부터 / report_only=보고서만)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - verify_only
          - report_only

permissions:
  contents: write   # 보고서 파일 commit & push
  issues: write     # 실패 시 자동 issue 생성
  id-token: write   # claude-code-action OIDC 토큰 발급
  pull-requests: write  # agent 모드에서 PR 작성 시 필요

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  curate:
    name: Curate international news
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup timezone (KST display in logs)
        run: |
          echo "UTC: $(date -u)"
          echo "KST: $(TZ='Asia/Seoul' date)"
          echo "REPORT_DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fetch dependencies
        run: pip install --quiet feedparser pyyaml

      # claude-code-action(@beta) agent 모드는 WebSearch/WebFetch를 disallow하므로,
      # 뉴스를 Python이 직접 RSS로 fetch해서 _workspace/raw_news.json에 저장한다.
      # Claude는 이 raw 데이터를 Read만 해서 정리·검증·분석·보고서 작성.
      - name: Fetch raw news (Google News RSS for categories + watchlist)
        run: python3 scripts/fetch_news.py

      # GitHub Secret 입력 시 끝에 줄바꿈/공백이 자동으로 끼어드는 케이스 방어.
      # HTTP 헤더에 들어갈 토큰에 \r\n\t 등이 포함되면 'invalid header value' 에러.
      - name: Sanitize OAuth token (strip whitespace)
        id: token
        env:
          RAW: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$RAW" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret이 비어있습니다. 등록 후 다시 시도하세요."
            exit 1
          fi
          CLEAN=$(printf '%s' "$RAW" | tr -d '\r\n\t ')
          # 정제된 값도 로그 마스킹에 포함시켜 노출 방지
          echo "::add-mask::$CLEAN"
          echo "value=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Run daily-news-curate skill
        uses: anthropics/claude-code-action@beta
        with:
          # Max 구독 사용. 로컬에서 `claude setup-token`으로 발급한 토큰을 GitHub Secrets에 등록.
          # 위 sanitize step에서 trailing whitespace 제거된 값을 사용.
          claude_code_oauth_token: ${{ steps.token.outputs.value }}
          # cron / workflow_dispatch 자동 실행은 'agent' 모드 사용.
          mode: agent
          # ⚠️ agent 모드는 기본으로 WebSearch/WebFetch를 disallow함. 본 하네스는 이 두 도구가 필수
          # (뉴스 수집·URL 실재성 검증)이므로 반드시 명시적으로 허용해야 한다. 누락 시 모델이 도구
          # 호출에 모두 실패하여 "WebSearch 기능 부재"로 빈 보고서를 생성하거나 학습 데이터로
          # hallucinate한다 (2026-05-08 v1~v3 사례).
          allowed_tools: "WebSearch,WebFetch,Read,Write,Edit,Bash,Glob,Grep"
          direct_prompt: |
            오늘은 ${{ env.REPORT_DATE_KST }} (KST). 자동 실행이며 사용자 상호작용 없음.

            ## ⚠️ 데이터 입력 (반드시 먼저 읽을 것)

            이전 step에서 Python 스크립트(`scripts/fetch_news.py`)가 Google News RSS로
            직전 24시간 뉴스를 fetch하여 `_workspace/raw_news.json`에 저장했다.
            **이 파일을 Read 도구로 읽는 것이 첫 작업이며, 이 파일의 내용만이 사실의 원천**이다.

            구조:
            - `categories.{monetary_policy|geopolitics|trade|commodities}[]`: 카테고리별 사건 리스트
            - `watchlist.{TICKER}.items[]`: watchlist 종목별 사건 리스트
            - 각 항목 필드: title, link, published, source(매체명), tier(1=통신사 ~ 5=기타),
              summary, additional_sources[](같은 헤드라인의 추가 매체)

            ## ⚠️ Anti-hallucination — 절대 규칙

            1. **WebSearch/WebFetch 도구는 비활성화됨. 호출 시도 금지.** 본 환경에서 작동하지 않는다.
            2. **모든 사실·수치·URL은 raw_news.json의 항목에서만 인용.** 학습 데이터 보완 금지.
               (raw_news.json의 데이터는 24시간 내 실재 RSS 출처이므로 신뢰 가능 — fabricate 우려 없음.)
            3. **출처 URL은 raw_news.json의 link 필드를 그대로 복사**. 수정·축약 금지.
            4. **수치(주가, 지수 포인트 등)가 헤드라인/summary에 명시되지 않았으면 보고서에 "수치 미확인"으로 표기**.
               summary는 600자로 잘려있어 본문 전체가 아니므로, summary에 안 보이면 추정 금지.
            5. **여러 매체 보도 확인 = additional_sources 길이로 카운트.** 1차 매체(tier 1-2) 단독은 MEDIUM, 2개+는 HIGH 후보.

            ## 작업 흐름 (간소화)

            `.claude/skills/daily-news-curate/SKILL.md`의 워크플로우를 따르되, Phase 2(수집)는 다음으로 대체:
            - Phase 2: `_workspace/raw_news.json`을 Read하여 events[] 형태로 변환
              (`_workspace/01_collected.json`에 저장). 같은 카테고리 내 다른 헤드라인이지만
              같은 사건일 수 있으므로 의미적 중복 제거(예: 같은 Fed 인사 발언을 다른 표현으로
              보도한 두 매체는 같은 event_id로 묶기).
            - Phase 3: cross-verifier가 신뢰도 부여. **URL 실재성 검증(WebFetch)은 RSS 출처이므로
              생략**. 대신 additional_sources 매체 수와 tier로 신뢰도 평가.
            - Phase 4-5: 분석 + 보고서 작성 (기존대로).

            모드: ${{ github.event.inputs.mode || 'full' }}
            결과 파일: reports/${{ env.REPORT_DATE_KST }}.md (이미 존재 시 _v2/_v3 접미사)

            ## ⚠️ Watchlist 섹션 누락 절대 금지

            raw_news.json의 `watchlist.{TICKER}.items`에 항목이 있다 (이전 실행에서 290건 수집된 사례). **반드시** 모든 watchlist 종목(AAPL, 005930.KS, NVDA, MSFT, AMD, TSLA, ^GSPC, ^IXIC)을 검토하고 보고서에 "## 관심 종목 뉴스" 섹션을 작성할 것.

            - 게재 기준 (사용자 명시 요구 "겹치는 내용만 올림"): Tier 1-2 매체 2개 이상이 같은 사건을 보도한 경우만. 단일 매체 단독은 LOW로 분류하고 종목 sub-section엔 게재 안 함.
            - 모든 종목이 0건이어도 섹션 헤더는 남기고 "검토 결과: 신뢰도 높은 종목별 사건 없음 (검토 항목: AAPL, NVDA, ...)" 1줄로라도 적을 것.

            ## ⚠️ 보고서 서술 스타일

            **불릿 위주의 짧은 나열은 가독성이 떨어진다.** 각 사건은 다음 3 단락으로 풀어쓸 것:
            - 단락 1 (사실): 3~5 문장 평서문. 핵심 수치는 본문 문장에 직접 박는다.
            - 단락 2 (시장 영향): 3~5 문장. 섹터·티커 영향과 영향 경로를 줄글로.
            - 단락 3 (반사실 + 가격 반영도): 1~3 문장.

            이후 보조 정보(시간 지평, 수혜/부담 티커)만 불릿 1~3개로 표시.
            각 사건 끝에 출처 표기: "_출처: Reuters, Bloomberg, FT — [Reuters](URL)_"

            ## ⚠️ 출처 표기 정확성

            보고서에 "Google News RSS"라고 적지 말 것. Google News는 단순 aggregator이며 실제 출처는 source 필드의 매체명(Reuters/Bloomberg/FT/CNBC 등)이다. 출처 부록 표의 URL은 raw_news.json의 link 필드를 그대로 사용.

            ## 보고서 마지막에 "## 검증 메타" 섹션 추가

            - 입력 raw_news.json: 카테고리 N건 / watchlist M건
            - 보고서 게재: HIGH X / MEDIUM Y / LOW Z / DROP W
            - 출처 매체 수 (unique, 매체명 리스트)
            - 학습 데이터 보완: 0건 (원칙적으로 0이어야 함)
          # claude-code-action agent 모드는 도구 자동 허용. allowed_tools 입력 미사용.
          # 추가 도구가 필요하면 claude_args로 전달.

      - name: Verify report was created
        id: verify
        run: |
          REPORT="reports/${REPORT_DATE_KST}.md"
          if [ -f "$REPORT" ] || ls reports/${REPORT_DATE_KST}_v*.md >/dev/null 2>&1; then
            echo "report_exists=true" >> "$GITHUB_OUTPUT"
            echo "REPORT 생성 확인: $(ls reports/${REPORT_DATE_KST}*.md)"
          else
            echo "report_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::보고서 파일이 생성되지 않았습니다: $REPORT"
          fi

      - name: Commit & push report
        if: steps.verify.outputs.report_exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — commit skip"
          else
            git commit -m "report: ${REPORT_DATE_KST} 국제정세 데일리 브리핑"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동] ${process.env.REPORT_DATE_KST} 데일리 뉴스 실행 실패`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n자동 보고서 생성에 실패했습니다. 위 링크에서 로그를 확인하세요.`,
              labels: ['daily-news', 'automation-failure']
            });
