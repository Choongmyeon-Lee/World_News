name: Daily News Curation

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전일). GitHub Actions cron은 정시 실행이 보장되지 않아 5~15분 지연될 수 있음.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (full=처음부터 / verify_only=검증부터 / report_only=보고서만)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - verify_only
          - report_only

permissions:
  contents: write   # 보고서 파일 commit & push
  issues: write     # 실패 시 자동 issue 생성
  id-token: write   # claude-code-action OIDC 토큰 발급
  pull-requests: write  # agent 모드에서 PR 작성 시 필요

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  curate:
    name: Curate international news
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup timezone (KST display in logs)
        run: |
          echo "UTC: $(date -u)"
          echo "KST: $(TZ='Asia/Seoul' date)"
          echo "REPORT_DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)" >> "$GITHUB_ENV"

      # GitHub Secret 입력 시 끝에 줄바꿈/공백이 자동으로 끼어드는 케이스 방어.
      # HTTP 헤더에 들어갈 토큰에 \r\n\t 등이 포함되면 'invalid header value' 에러.
      - name: Sanitize OAuth token (strip whitespace)
        id: token
        env:
          RAW: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$RAW" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret이 비어있습니다. 등록 후 다시 시도하세요."
            exit 1
          fi
          CLEAN=$(printf '%s' "$RAW" | tr -d '\r\n\t ')
          # 정제된 값도 로그 마스킹에 포함시켜 노출 방지
          echo "::add-mask::$CLEAN"
          echo "value=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Run daily-news-curate skill
        uses: anthropics/claude-code-action@beta
        with:
          # Max 구독 사용. 로컬에서 `claude setup-token`으로 발급한 토큰을 GitHub Secrets에 등록.
          # 위 sanitize step에서 trailing whitespace 제거된 값을 사용.
          claude_code_oauth_token: ${{ steps.token.outputs.value }}
          # cron / workflow_dispatch 자동 실행은 'agent' 모드 사용.
          mode: agent
          # ⚠️ agent 모드는 기본으로 WebSearch/WebFetch를 disallow함. 본 하네스는 이 두 도구가 필수
          # (뉴스 수집·URL 실재성 검증)이므로 반드시 명시적으로 허용해야 한다. 누락 시 모델이 도구
          # 호출에 모두 실패하여 "WebSearch 기능 부재"로 빈 보고서를 생성하거나 학습 데이터로
          # hallucinate한다 (2026-05-08 v1~v3 사례).
          allowed_tools: "WebSearch,WebFetch,Read,Write,Edit,Bash,Glob,Grep"
          direct_prompt: |
            오늘은 ${{ env.REPORT_DATE_KST }} (KST). 자동 실행이며 사용자 상호작용 없음.

            ## ⚠️ CRITICAL Anti-hallucination 지시 (모든 단계에서 엄수)

            이 보고서는 사용자가 미국 주식 투자 의사결정에 활용한다. **사실과 다른 수치·URL 1개라도 보고서에 들어가면 사용자에게 금전적 손실을 입힐 수 있다.** 이전 실행에서 fabricated URL과 hallucinated 수치(NASDAQ ~17,500 등 학습 데이터 패턴)가 보고서에 들어간 적이 있다. 이번엔 다음을 엄격 준수:

            1. **당신의 학습 데이터 cutoff는 작업 기준 시점(${{ env.REPORT_DATE_KST }})보다 1년+ 오래됐다.** 학습 데이터의 어떤 수치/URL/사건도 "오늘의 사실"로 간주 금지. 익숙한 패턴이 떠오르면 hallucination 신호.
            2. **모든 출처 URL은 검색 결과에 실제로 등장한 URL만 그대로 복사**해 사용. URL을 만들거나 수정하지 말 것. verifier 단계에서 모든 URL을 WebFetch로 200 OK + 본문 사실 등장 확인을 통과해야 함. 통과 못 한 사건은 DROP.
            3. **모든 수치(주가, 지수 포인트, 환율, 금리, 사상자 수 등)는 1차 출처 본문에서 직접 인용한 값만 사용.** 추정값/근사값 절대 금지. verified_facts에 없는 수치는 "미확인"으로 표기.
            4. **검색 시 절대 날짜 명시:** "NASDAQ close ${{ env.REPORT_DATE_KST }}", "S&P 500 ${{ env.REPORT_DATE_KST }}" 등.
            5. **HIGH/MEDIUM 사건이 0건이면 정직히 "신뢰 있는 뉴스 없음"으로 보고**할 것. 빈 보고서 > hallucinated 보고서.

            ## 작업

            `.claude/skills/daily-news-curate/SKILL.md` 의 daily-news-curate 스킬을 실행하여
            직전 24시간 KST 국제정세 뉴스를 수집·교차검증·시장영향 분석·보고서 작성하라.

            모드: ${{ github.event.inputs.mode || 'full' }}
            - full: Phase 0부터 전체 실행
            - verify_only: 기존 _workspace/01_collected.json 사용, Phase 3부터 시작
            - report_only: 기존 _workspace/03_analyzed.json 사용, Phase 5만 실행

            결과 파일: reports/${{ env.REPORT_DATE_KST }}.md
            모든 결정은 합리적 기본값으로 자동 처리.

            보고서 마지막에 "## 검증 메타" 섹션 추가:
            - 검색 호출 수 (WebSearch + WebFetch)
            - URL 검증 통과/실패 건수
            - 학습 데이터로 보완한 부분 (있으면 명시 — 원칙적으로 0이어야 함)
          # claude-code-action agent 모드는 도구 자동 허용. allowed_tools 입력 미사용.
          # 추가 도구가 필요하면 claude_args로 전달.

      - name: Verify report was created
        id: verify
        run: |
          REPORT="reports/${REPORT_DATE_KST}.md"
          if [ -f "$REPORT" ] || ls reports/${REPORT_DATE_KST}_v*.md >/dev/null 2>&1; then
            echo "report_exists=true" >> "$GITHUB_OUTPUT"
            echo "REPORT 생성 확인: $(ls reports/${REPORT_DATE_KST}*.md)"
          else
            echo "report_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::보고서 파일이 생성되지 않았습니다: $REPORT"
          fi

      - name: Commit & push report
        if: steps.verify.outputs.report_exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — commit skip"
          else
            git commit -m "report: ${REPORT_DATE_KST} 국제정세 데일리 브리핑"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동] ${process.env.REPORT_DATE_KST} 데일리 뉴스 실행 실패`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n자동 보고서 생성에 실패했습니다. 위 링크에서 로그를 확인하세요.`,
              labels: ['daily-news', 'automation-failure']
            });
